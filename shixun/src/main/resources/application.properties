spring.config.import=optional:file:./application-local.properties
spring.application.name=and-taste
server.address=0.0.0.0
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/shixun?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql,classpath:and_taste_schema.sql,classpath:sample_work_order_import.sql,classpath:bulk_production_order_import.sql,classpath:product_inventory_import.sql
spring.sql.init.continue-on-error=true

# 通义千问 API Key（请替换为你自己的 Key，从阿里云百炼平台获取）
qwen.api.key=${QWEN_API_KEY:}
siliconflow.image.edit.model=Qwen/Qwen-Image-Edit-2509

# 真实物流API：快递100
# 正式使用时请放到 shixun/application-local.properties，不要提交到代码仓库
kuaidi100.customer=
kuaidi100.key=
# 订阅推送需要公网可访问URL，例如 https://你的域名/api/logistics/callback/kuaidi100
kuaidi100.callback-url=
# 可选：回调签名盐值，配置后会校验快递100回调 sign
kuaidi100.salt=

# AI streaming response timeout
spring.mvc.async.request-timeout=180000

# 墨刀 AI 设计工作区（令牌请放到 shixun/application-local.properties，不要提交仓库）
modao.api.key=${MODAO_API_KEY:}
modao.design.url=https://modao.cc/ai/design/spmrsxjgcyi6g0h1/6a5dd48151e5a21110c1697a
modao.api.base-url=https://modao.cc
modao.chrome.path=/Applications/Google Chrome.app/Contents/MacOS/Google Chrome
